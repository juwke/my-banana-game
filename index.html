<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Banana Clicker - Double Power</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-bg: #0b0b0b; --card-bg: #161616; --accent: #fbc531; --diamond: #00a8ff; --crypto: #9c88ff; --danger: #e84118; --success: #4cd137; }
        body { 
            background-color: var(--main-bg); color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; height: 100vh; overflow: hidden;
        }
        .header { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; 
            background: var(--card-bg); padding: 10px 15px; border-radius: 15px; border: 1px solid #333;
        }
        .stat { text-align: center; min-width: 80px; padding: 5px; }
        .stat-val { font-size: 18px; font-weight: bold; display: block; }
        .stat-label { font-size: 9px; color: #777; text-transform: uppercase; }

        .main-clicker { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .banana-emoji { font-size: 130px; cursor: pointer; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        .banana-emoji:active { transform: scale(0.85); }

        .menu { 
            width: 100%; background: var(--card-bg); padding: 20px 0; border-radius: 30px 30px 0 0;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px;
            box-sizing: border-box; border-top: 1px solid #333;
        }
        .btn { 
            background: #222; border: none; color: white; padding: 14px; 
            border-radius: 14px; font-weight: bold; font-size: 13px; cursor: pointer;
        }
        .btn-save { background: var(--success); grid-column: span 2; margin-top: 5px; }
        .btn-shop { border-bottom: 3px solid var(--accent); }
        .btn-loan { border-bottom: 3px solid var(--danger); }
        .btn-donate { border-bottom: 3px solid var(--diamond); }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.97); flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .card { background: var(--card-bg); padding: 25px; border-radius: 25px; width: 85%; text-align: center; border: 1px solid #444; overflow-y: auto; max-height: 80vh; }
        .close { margin-top: 25px; color: #777; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat"><span class="stat-val" id="score">0</span><span class="stat-label">Бананы 🍌</span></div>
        <div class="stat"><span class="stat-val" id="diamonds" style="color:var(--diamond)">0</span><span class="stat-label">Алмазы 💎</span></div>
        <div class="stat"><span class="stat-val" id="crypto-stat" style="color:var(--crypto)">0</span><span class="stat-label">Крипто ₿</span></div>
        <div class="stat"><span class="stat-val" id="loan-stat" style="color:var(--danger)">0</span><span class="stat-label">Долг 💸</span></div>
    </div>

    <div class="main-clicker">
        <div class="banana-emoji" id="banana">🍌</div>
    </div>

    <div class="menu">
        <button class="btn btn-shop" onclick="openModal('shop')">МАГАЗИН</button>
        <button class="btn btn-loan" onclick="openModal('loan')">ЗАЙМ</button>
        <button class="btn btn-donate" onclick="alert('Скоро!')">ДОНАТ</button>
        <button class="btn" onclick="alert('В разработке')">ОПЦИИ</button>
        <button class="btn btn-save" onclick="saveGame()">СОХРАНИТЬ ПРОГРЕСС</button>
    </div>

    <div id="modal">
        <div class="card" id="modal-content"></div>
        <span class="close" onclick="closeModal()">ЗАКРЫТЬ</span>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let data = {
            bananas: 0, diamonds: 0, crypto: 0,
            clickPower: 1, upgCost: 100,
            doubleCost: 100, // Начальная цена за удвоение в алмазах
            loan: 0, loanTime: 0
        };

        function loadGame() {
            const saved = localStorage.getItem('bananaSave');
            if (saved) {
                data = JSON.parse(saved);
                if (!data.doubleCost) data.doubleCost = 100;
                checkLoanStatus();
                updateDisplay();
            }
        }

        function saveGame() {
            localStorage.setItem('bananaSave', JSON.stringify(data));
            tg.HapticFeedback.notificationOccurred('success');
            alert("Игра успешно сохранена!");
        }

        function updateDisplay() {
            document.getElementById('score').innerText = Math.floor(data.bananas);
            document.getElementById('diamonds').innerText = data.diamonds;
            document.getElementById('crypto-stat').innerText = data.crypto;
            document.getElementById('loan-stat').innerText = data.loan;
        }

        document.getElementById('banana').addEventListener('touchstart', (e) => {
            e.preventDefault();
            let multiplier = data.crypto > 0 ? Math.pow(2, data.crypto) : 1;
            data.bananas += (data.clickPower * multiplier);
            updateDisplay();
            tg.HapticFeedback.impactOccurred('medium');
        });

        function openModal(type) {
            const mc = document.getElementById('modal-content');
            if (type === 'shop') {
                mc.innerHTML = `<h3>Магазин</h3>
                    <p>Клик: +${data.clickPower}</p>
                    <button class="btn btn-shop" style="width:100%" onclick="buyUpgrade()">+1 К КЛИКУ (${data.upgCost} 🍌)</button>
                    
                    <hr style="border:1px solid #333; margin:15px 0">
                    <p style="color:var(--diamond)"><b>УДВОЕНИЕ ТАПА (X2)</b></p>
                    <button class="btn" style="background:var(--diamond); color:white; width:100%" onclick="buyDouble()">УДВОИТЬ (${data.doubleCost} 💎)</button>
                    
                    <hr style="border:1px solid #333; margin:15px 0">
                    <p style="color:var(--crypto)"><b>КРИПТО-ИНВЕСТ</b></p>
                    <button class="btn" style="background:var(--crypto); width:100%" onclick="buyCrypto()">КУПИТЬ 1 ₿ (1000 💎)</button>
                    
                    <hr style="border:1px solid #333; margin:15px 0">
                    <button class="btn" style="width:100%" onclick="exchange()">ОБМЕН (1000 🍌 -> 10 💎)</button>`;
            } else if (type === 'loan') {
                mc.innerHTML = `<h3>Банковский Займ</h3>
                    <input type="number" id="loan-amount" placeholder="Сумма" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #444; border-radius:10px; text-align:center;">
                    <button class="btn btn-loan" style="width:100%" onclick="takeLoan()">ВЗЯТЬ МОНЕТЫ</button>
                    <button class="btn" style="width:100%; margin-top:10px" onclick="payLoan()">ВЕРНУТЬ ДОЛГ</button>`;
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function buyUpgrade() {
            if (data.bananas >= data.upgCost) {
                data.bananas -= data.upgCost;
                data.clickPower += 1;
                data.upgCost = Math.floor(data.upgCost * 1.6);
                updateDisplay();
                closeModal();
            } else { alert("Мало бананов!"); }
        }

        function buyDouble() {
            if (data.diamonds >= data.doubleCost) {
                data.diamonds -= data.doubleCost;
                data.clickPower *= 2; // Умножаем текущую силу на 2
                data.doubleCost *= 3; // Каждое следующее удвоение дороже
                updateDisplay();
                alert("МОЩЬ УДВОЕНА!");
                closeModal();
            } else { alert("Недостаточно алмазов!"); }
        }

        function buyCrypto() {
            if (data.diamonds >= 1000) {
                data.diamonds -= 1000;
                data.crypto += 1;
                updateDisplay();
                alert("Куплено 1 ₿! Весь доход удвоен!");
                closeModal();
            } else { alert("Нужно 1000 алмазов!"); }
        }

        function exchange() {
            if (data.bananas >= 1000) {
                data.bananas -= 1000;
                data.diamonds += 10;
                updateDisplay();
            }
        }

        function takeLoan() {
            let amt = parseInt(document.getElementById('loan-amount').value);
            if (amt > 0 && amt <= 100000 && data.loan === 0) {
                data.loan = amt;
                data.bananas += amt;
                data.loanTime = Date.now();
                updateDisplay();
                closeModal();
            } else { alert("Займ недоступен!"); }
        }

        function payLoan() {
            if (data.bananas >= data.loan && data.loan > 0) {
                data.bananas -= data.loan;
                data.loan = 0;
                data.loanTime = 0;
                updateDisplay();
            }
        }

        function checkLoanStatus() {
            if (data.loan > 0 && (Date.now() - data.loanTime > 86400000)) {
                data.bananas -= data.loan;
                data.loan = 0;
                alert("Срок займа истек!");
            }
        }

        loadGame();
    </script>
</body>
</html>
