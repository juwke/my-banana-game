<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Banana Clicker - Major Update</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-bg: #050505; --card-bg: #111; --accent: #fbc531; --ether: #00d2ff; --danger: #eb4d4b; --success: #6ab04c; }
        body { background: var(--main-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }

        /* ТЕХНИЧЕСКИЙ ПЕРЕРЫВ */
        #tech-break { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        #timer { font-size: 48px; font-weight: bold; color: var(--danger); font-family: monospace; margin: 20px 0; }
        .tech-fact { font-size: 14px; color: #888; font-style: italic; max-width: 80%; }
        #login-btn { display: none; margin-top: 20px; background: var(--success); padding: 15px 40px; border-radius: 15px; border: none; color: white; font-weight: bold; }

        /* ИНТЕРФЕЙС */
        .header { background: var(--card-bg); padding: 20px; border-radius: 0 0 25px 25px; width: 90%; border: 1px solid #222; display: flex; justify-content: space-around; }
        .stat-box { text-align: center; }
        .val { font-size: 20px; font-weight: bold; display: block; }
        .lbl { font-size: 10px; color: #666; text-transform: uppercase; }

        .click-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .banana-main { font-size: 120px; cursor: pointer; transition: 0.1s; user-select: none; }
        .banana-main:active { transform: scale(0.9); }

        .footer-menu { width: 100%; background: var(--card-bg); padding: 15px; border-radius: 30px 30px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid #333; }
        .btn { background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 12px; }
        .save-btn { grid-column: span 2; background: var(--success); color: black; border: none; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-card { background: var(--card-bg); width: 85%; padding: 25px; border-radius: 25px; border: 1px solid #333; max-height: 80vh; overflow-y: auto; }
        
        .history-item { font-size: 11px; padding: 8px; border-bottom: 1px solid #222; text-align: left; color: #aaa; }
        .limit-info { font-size: 10px; color: var(--danger); margin-top: 5px; }
    </style>
</head>
<body>

    <div id="tech-break">
        <h2 style="color:var(--accent)">ТЕХНИЧЕСКИЙ ПЕРЕРЫВ</h2>
        <p style="font-size: 12px;">Обновляем экономику: удаляем Биткоины и вводим <b>ЭФИР (💠)</b></p>
        <div id="timer">30:00</div>
        <p class="tech-fact" id="tech-fact-text">Знаете ли вы: Эфир нельзя получить обычным кликом.</p>
        <button id="login-btn" onclick="enterGame()">ПОПРОБОВАТЬ ВОЙТИ</button>
    </div>

    <div class="header">
        <div class="stat-box">
            <span class="val" id="b-val">0</span>
            <span class="lbl">Бананы 🍌</span>
        </div>
        <div class="stat-box">
            <span class="val" id="e-val" style="color:var(--ether)">0</span>
            <span class="lbl">Эфир 💠</span>
        </div>
    </div>

    <div class="click-area">
        <div class="banana-main" id="tap-node">🍌</div>
    </div>

    <div class="footer-menu">
        <button class="btn" onclick="openShop()">МАГАЗИН 🛒</button>
        <button class="btn" onclick="openFinances()">ФИНАНСЫ 💳</button>
        <button class="btn" onclick="openHistory()">ИСТОРИЯ 📜</button>
        <button class="btn" onclick="resetGame()">СБРОС ⚙️</button>
        <button class="btn save-btn" onclick="saveGame()">СОХРАНИТЬ ПРОГРЕСС</button>
    </div>

    <div id="modal">
        <div class="modal-card" id="m-content"></div>
        <p onclick="closeModal()" style="margin-top:20px; font-weight:bold; color:#555">ЗАКРЫТЬ</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let data = { 
            bananas: 0, ether: 0, clickPower: 1, 
            upgCost: 100, loan: 0, 
            history: [] 
        };

        const LOAN_LIMIT = 50000;

        // ТАЙМЕР ТЕХРАБОТ
        let timeLeft = 30 * 60;
        const facts = [
            "Эфир — это элитная валюта для топ-игроков.",
            "Мы удалили Биткоины, так как они обесценились.",
            "Новую валюту можно купить за Звезды Telegram у @Bulba_73.",
            "Обмен 1,000,000 бананов даст вам 1 Эфир.",
            "Техработы нужны для стабильности базы данных."
        ];

        function startTechTimer() {
            const tNode = document.getElementById('timer');
            const fNode = document.getElementById('tech-fact-text');
            
            const countdown = setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                tNode.innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                
                if (timeLeft % 10 === 0) {
                    fNode.innerText = facts[Math.floor(Math.random() * facts.length)];
                }

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    tNode.innerText = "ГОТОВО";
                    document.getElementById('login-btn').style.display = "block";
                }
                timeLeft--;
            }, 1000);
        }

        function enterGame() {
            document.getElementById('tech-break').style.display = "none";
            loadGame();
        }

        function loadGame() {
            const saved = localStorage.getItem('banana_v3');
            if (saved) data = Object.assign(data, JSON.parse(saved));
            updateUI();
        }

        function updateUI() {
            document.getElementById('b-val').innerText = Math.floor(data.bananas);
            document.getElementById('e-val').innerText = data.ether;
        }

        document.getElementById('tap-node').onclick = () => {
            data.bananas += data.clickPower;
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        };

        // МАГАЗИН
        function openShop() {
            showModal(`
                <h3>МАГАЗИН</h3>
                <button class="btn" style="width:100%; margin-bottom:10px" onclick="buyUpg()">+1 К КЛИКУ (${data.upgCost} 🍌)</button>
                <hr border="0" height="1" bgcolor="#222">
                <p style="font-size:12px">КУПИТЬ ЭФИР 💠</p>
                <button class="btn" style="width:100%; color:var(--ether)" onclick="exchangeEther()">1,000,000 🍌 -> 1 💠</button>
                <button class="btn" style="width:100%; margin-top:10px; background:var(--accent); color:black" onclick="tg.openTelegramLink('https://t.me/Bulba_73')">КУПИТЬ ЗА ЗВЕЗДЫ ⭐️</button>
            `);
        }

        function buyUpg() {
            if(data.bananas >= data.upgCost) {
                data.bananas -= data.upgCost;
                data.clickPower++;
                data.upgCost *= 2;
                logEvent(`Куплено улучшение за ${data.upgCost/2} 🍌`);
                updateUI(); openShop();
            }
        }

        function exchangeEther() {
            if(data.bananas >= 1000000) {
                data.bananas -= 1000000;
                data.ether += 1;
                logEvent(`Обменял 1М бананов на 1 Эфир 💠`);
                updateUI(); openShop();
            }
        }

        // ФИНАНСЫ И ЗАЙМЫ
        function openFinances() {
            showModal(`
                <h3>ФИНАНСЫ</h3>
                <p>Ваш долг: <b style="color:var(--danger)">${data.loan}</b> / ${LOAN_LIMIT}</p>
                <input id="loan-amt" type="number" placeholder="Сумма займа">
                <div class="limit-info">Максимальный лимит: ${LOAN_LIMIT} 🍌</div>
                <button class="btn" style="width:100%; margin-top:10px" onclick="takeLoan()">ВЗЯТЬ ЗАЙМ</button>
                <button class="btn" style="width:100%; margin-top:10px; border-color:var(--success)" onclick="repayLoan()">ВЕРНУТЬ ДОЛГ</button>
            `);
        }

        function takeLoan() {
            let val = parseInt(document.getElementById('loan-amt').value);
            if(val > 0 && (data.loan + val) <= LOAN_LIMIT) {
                data.loan += val;
                data.bananas += val;
                logEvent(`Взял займ: ${val} 🍌`);
                updateUI(); closeModal();
            } else {
                tg.showAlert("Превышен лимит или введена неверная сумма!");
            }
        }

        function repayLoan() {
            if(data.bananas >= data.loan && data.loan > 0) {
                data.bananas -= data.loan;
                logEvent(`Погасил долг: ${data.loan} 🍌`);
                data.loan = 0;
                updateUI(); closeModal();
            }
        }

        function openHistory() {
            let items = data.history.slice(-15).reverse().map(i => `<div class="history-item">${i}</div>`).join('');
            showModal(`<h3>ИСТОРИЯ</h3><div style="max-height:200px; overflow:auto">${items || "История пуста"}</div>`);
        }

        function logEvent(txt) {
            let time = new Date().toLocaleTimeString();
            data.history.push(`[${time}] ${txt}`);
        }

        function saveGame() {
            localStorage.setItem('banana_v3', JSON.stringify(data));
            tg.showConfirm("Данные сохранены на сервере!", () => {});
        }

        function resetGame() {
            if(confirm("СБРОСИТЬ ВСЁ? Эфир и улучшения пропадут!")) {
                data = { bananas: 0, ether: 0, clickPower: 1, upgCost: 100, loan: 0, history: [] };
                localStorage.clear();
                updateUI();
                tg.showAlert("Прогресс обнулен.");
            }
        }

        function showModal(html) { document.getElementById('modal').style.display = "flex"; document.getElementById('m-content').innerHTML = html; }
        function closeModal() { document.getElementById('modal').style.display = "none"; }

        startTechTimer();
    </script>
</body>
</html>
