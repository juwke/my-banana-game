<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Banana Clicker Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-bg: #0b0b0b; --card-bg: #161616; --accent: #f1c40f; --diamond: #3498db; }
        body { 
            background-color: var(--main-bg); color: white; font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; height: 100vh; overflow: hidden;
            user-select: none;
        }
        
        /* Счётчики */
        .header { 
            display: flex; gap: 20px; margin-top: 30px; 
            background: var(--card-bg); padding: 15px 30px; border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #222;
        }
        .stat { text-align: center; }
        .stat-val { font-size: 24px; font-weight: bold; display: block; }
        .stat-label { font-size: 10px; color: #777; text-transform: uppercase; }
        
        /* Кликабельный банан (теперь эмодзи) */
        .main-clicker { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .banana-emoji { 
            font-size: 150px; cursor: pointer; transition: transform 0.05s ease;
            -webkit-tap-highlight-color: transparent; filter: drop-shadow(0 0 20px rgba(241, 196, 15, 0.3));
        }
        .banana-emoji:active { transform: scale(0.8); }

        /* Кнопки меню */
        .menu { 
            width: 100%; background: var(--card-bg); padding: 30px 0; border-radius: 35px 35px 0 0;
            display: flex; justify-content: center; gap: 15px; border-top: 1px solid #333;
        }
        .btn { 
            background: #222; border: none; color: white; padding: 18px 30px; 
            border-radius: 20px; font-size: 16px; font-weight: bold; transition: 0.2s;
        }
        .btn-shop { border-bottom: 4px solid var(--accent); }
        .btn-donate { border-bottom: 4px solid var(--diamond); opacity: 0.8; }

        /* Магазин */
        #shop-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .shop-card { background: var(--card-bg); padding: 30px; border-radius: 30px; width: 85%; border: 1px solid #444; }
        .shop-item { background: #222; margin: 12px 0; padding: 15px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--accent); color: black; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat">
            <span class="stat-val" id="score">0</span>
            <span class="stat-label">Бананы 🍌</span>
        </div>
        <div class="stat">
            <span class="stat-val" style="color: var(--diamond)" id="diamonds">0</span>
            <span class="stat-label">Алмазы 💎</span>
        </div>
    </div>

    <div class="main-clicker">
        <div class="banana-emoji" id="banana">🍌</div>
    </div>

    <div class="menu">
        <button class="btn btn-shop" onclick="toggleShop()">МАГАЗИН</button>
        <button class="btn btn-donate" onclick="alert('Скоро!')">ДОНАТ</button>
    </div>

    <div id="shop-modal">
        <div class="shop-card">
            <h2 style="margin:0 0 20px 0">Улучшения</h2>
            <div class="shop-item">
                <div style="text-align:left"><b>Мульти-тап</b><br><small id="upg-lvl">Ур. 1</small></div>
                <button class="buy-btn" onclick="buyUpgrade()">💎 <span id="upg-cost">10</span></button>
            </div>
            <div class="shop-item">
                <div style="text-align:left"><b>+50 Алмазов</b><br><small>Цена: 500 🍌</small></div>
                <button class="buy-btn" style="background: var(--diamond); color: white;" onclick="exchangeMoney()">КУПИТЬ</button>
            </div>
            <p onclick="toggleShop()" style="color: #ff4757; margin-top: 30px; font-weight: bold; cursor: pointer;">ЗАКРЫТЬ</p>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let bananas = 0;
        let diamonds = 0;
        let clickPower = 1;
        let upgradeCost = 10;
        let totalClicks = 0;

        function updateDisplay() {
            document.getElementById('score').innerText = Math.floor(bananas);
            document.getElementById('diamonds').innerText = diamonds;
            document.getElementById('upg-cost').innerText = upgradeCost;
            document.getElementById('upg-lvl').innerText = 'Ур. ' + clickPower;
        }

        document.getElementById('banana').addEventListener('touchstart', (e) => {
            e.preventDefault();
            bananas += clickPower;
            totalClicks++;
            
            if (totalClicks >= 100) {
                diamonds += Math.floor(Math.random() * 6) + 5;
                totalClicks = 0;
                tg.HapticFeedback.notificationOccurred('success');
            }
            updateDisplay();
            tg.HapticFeedback.impactOccurred('medium');
        });

        function toggleShop() {
            const modal = document.getElementById('shop-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function buyUpgrade() {
            if (diamonds >= upgradeCost) {
                diamonds -= upgradeCost;
                clickPower++;
                upgradeCost = Math.floor(upgradeCost * 2); // Цена растет в 2 раза
                updateDisplay();
                tg.HapticFeedback.notificationOccurred('success');
            } else { alert('Не хватает алмазов!'); }
        }

        function exchangeMoney() {
            if (bananas >= 500) {
                bananas -= 500;
                diamonds += 50;
                updateDisplay();
                tg.HapticFeedback.notificationOccurred('success');
            } else { alert('Не хватает бананов!'); }
        }

        updateDisplay();
    </script>
</body>
</html>
