<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Banana Clicker - Bulba Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-bg: #0b0b0b; --card-bg: #161616; --accent: #fbc531; --diamond: #00a8ff; --crypto: #9c88ff; --danger: #e84118; --success: #4cd137; }
        body { 
            background-color: var(--main-bg); color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; height: 100vh; overflow: hidden;
        }

        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #disclaimer { 
            position: fixed; inset: 0; background: #000; z-index: 999; display: none; 
            flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center;
        }
        .loader { width: 50px; height: 50px; border: 5px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .header { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; 
            background: var(--card-bg); padding: 10px 15px; border-radius: 15px; border: 1px solid #333;
        }
        .stat { text-align: center; min-width: 80px; padding: 5px; }
        .stat-val { font-size: 16px; font-weight: bold; display: block; }
        .stat-label { font-size: 8px; color: #777; text-transform: uppercase; }

        .main-clicker { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .click-zone {
            width: 200px; height: 200px; border: 4px solid var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; position: relative;
            box-shadow: 0 0 30px rgba(251, 197, 49, 0.2); transition: transform 0.05s;
        }
        .click-zone:active { transform: scale(0.92); }
        .banana-emoji { font-size: 90px; user-select: none; }

        .menu { 
            width: 100%; background: var(--card-bg); padding: 15px; border-radius: 30px 30px 0 0;
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; border-top: 1px solid #333;
        }
        .btn { background: #222; border: none; color: white; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 11px; cursor: pointer; }
        .btn-bank { border-bottom: 3px solid var(--success); }
        .btn-shop { border-bottom: 3px solid var(--accent); }
        .btn-loan { border-bottom: 3px solid var(--danger); }
        .btn-save { grid-column: span 3; background: var(--success); margin-top: 5px; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 25px; width: 85%; max-height: 80vh; overflow-y: auto; border: 1px solid #444; text-align: center; }
        input { width: 85%; padding: 10px; margin: 8px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; text-align: center; }
        .loan-group { margin-bottom: 15px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 15px; }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="loader"></div><p>Загрузка...</p></div>

    <div id="disclaimer">
        <h2>ДИСКЛЕЙМЕР</h2>
        <p>Автор (TG: <b>@Bulba_73</b>) не упоминает о 18+ и ЛГБТ. Это игра.</p>
        <button class="btn btn-shop" style="width: 200px; margin-top: 20px;" onclick="closeDisclaimer()">ИГРАТЬ</button>
    </div>

    <div class="header">
        <div class="stat"><span class="stat-val" id="score">0</span><span class="stat-label">Бананы 🍌</span></div>
        <div class="stat"><span class="stat-val" id="diamonds" style="color:var(--diamond)">0</span><span class="stat-label">Алмазы 💎</span></div>
        <div class="stat"><span class="stat-val" id="crypto-stat" style="color:var(--crypto)">0</span><span class="stat-label">Крипто ₿</span></div>
        <div class="stat"><span class="stat-val" id="loan-stat" style="color:var(--danger)">0</span><span class="stat-label">Долг 💸</span></div>
    </div>

    <div class="main-clicker"><div class="click-zone" id="banana"><div class="banana-emoji">🍌</div></div></div>

    <div class="menu">
        <button class="btn btn-shop" onclick="openModal('shop')">МАГАЗИН</button>
        <button class="btn btn-bank" onclick="openModal('bank')">БАНК</button>
        <button class="btn btn-loan" onclick="openModal('loan')">ЗАЙМЫ</button>
        <button class="btn" onclick="alert('Скоро!')">ДОНАТ</button>
        <button class="btn" onclick="alert('В разработке')">ОПЦИИ</button>
        <button class="btn" style="background:var(--crypto)" onclick="alert('Вы нашли секрет! 🕵️‍♂️')">???</button>
        <button class="btn btn-save" onclick="saveGame()">СОХРАНИТЬ ПРОГРЕСС</button>
    </div>

    <div id="modal">
        <div class="card" id="modal-content"></div>
        <p onclick="closeModal()" style="color:#777; margin-top:15px; cursor:pointer">ЗАКРЫТЬ</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let data = {
            bananas: 0, diamonds: 0, crypto: 0,
            clickPower: 1, upgCost: 100, doubleCost: 1,
            loanB: 0, loanD: 0, loanC: 0, loanTime: 0
        };

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('disclaimer').style.display = 'flex';
            }, 2000); 
            loadGame();
            setInterval(checkLoans, 10000);
        };

        function closeDisclaimer() { document.getElementById('disclaimer').style.display = 'none'; }

        function loadGame() {
            const saved = localStorage.getItem('bananaSave');
            if (saved) { 
                let parsed = JSON.parse(saved);
                data = {...data, ...parsed}; // Сливаем данные, чтобы не было NaN
            }
            updateDisplay();
        }

        function saveGame() {
            localStorage.setItem('bananaSave', JSON.stringify(data));
            tg.HapticFeedback.notificationOccurred('success');
            alert("Прогресс сохранен!");
        }

        function updateDisplay() {
            document.getElementById('score').innerText = Math.floor(data.bananas || 0);
            document.getElementById('diamonds').innerText = data.diamonds || 0;
            document.getElementById('crypto-stat').innerText = data.crypto || 0;
            
            // Исправленный подсчет долга без NaN
            let b = data.loanB || 0;
            let d = data.loanD || 0;
            let c = data.loanC || 0;
            document.getElementById('loan-stat').innerText = (b + d + c);
        }

        document.getElementById('banana').onclick = () => {
            let mult = data.crypto > 0 ? Math.pow(2, data.crypto) : 1;
            data.bananas += (data.clickPower * mult);
            updateDisplay();
            tg.HapticFeedback.impactOccurred('medium');
        };

        function checkLoans() {
            if (data.loanTime > 0 && (Date.now() - data.loanTime > 86400000)) {
                data.bananas = Math.max(0, data.bananas - (data.loanB || 0));
                data.diamonds = Math.max(0, data.diamonds - (data.loanD || 0));
                data.crypto = Math.max(0, data.crypto - (data.loanC || 0));
                data.loanB = 0; data.loanD = 0; data.loanC = 0; data.loanTime = 0;
                alert("Время вышло! Долги списаны принудительно.");
                updateDisplay();
                saveGame();
            }
        }

        function openModal(type) {
            const mc = document.getElementById('modal-content');
            if (type === 'shop') {
                mc.innerHTML = `<h3>Магазин</h3>
                    <button class="btn" style="width:100%; margin-bottom:5px;" onclick="buyUpg()">+1 КЛИК (${data.upgCost} 🍌)</button>
                    <button class="btn" style="background:var(--crypto); width:100%; margin-bottom:5px;" onclick="buyDouble()">УДВОИТЬ (${data.doubleCost} ₿)</button>
                    <button class="btn" style="background:var(--diamond); width:100%; margin-bottom:5px;" onclick="buyCrypto()">1 ₿ (10000 💎)</button>
                    <button class="btn" style="width:100%; background:var(--accent); color:black;" onclick="exchange()">ОБМЕН (500 🍌 -> 50 💎)</button>`;
            } else if (type === 'bank') {
                mc.innerHTML = `<h3>Банк</h3>
                    <input id="target-user" placeholder="@username">
                    <input id="transfer-amt" type="number" placeholder="Сумма (макс 100к)">
                    <div style="display:flex; gap:5px; justify-content:center;">
                        <button class="btn" onclick="send('bananas')">🍌</button>
                        <button class="btn" onclick="send('diamonds')">💎</button>
                        <button class="btn" onclick="send('crypto')">₿</button>
                    </div>`;
            } else if (type === 'loan') {
                mc.innerHTML = `<h3>Займы</h3>
                    <p style="font-size:11px; color:var(--danger)">Списание через 24ч!</p>
                    <div class="loan-group">
                        <input id="amt-b" type="number" placeholder="Бананы (макс 1М)">
                        <button class="btn" style="width:100%" onclick="takeAnyLoan('bananas', 1000000, 'amt-b')">ВЗЯТЬ 🍌</button>
                    </div>
                    <div class="loan-group">
                        <input id="amt-d" type="number" placeholder="Алмазы (макс 100к)">
                        <button class="btn" style="background:var(--diamond); width:100%" onclick="takeAnyLoan('diamonds', 100000, 'amt-d')">ВЗЯТЬ 💎</button>
                    </div>
                    <div class="loan-group">
                        <input id="amt-c" type="number" placeholder="Крипто (макс 100)">
                        <button class="btn" style="background:var(--crypto); width:100%" onclick="takeAnyLoan('crypto', 100, 'amt-c')">ВЗЯТЬ ₿</button>
                    </div>
                    <button class="btn" style="width:100%; background:var(--success)" onclick="payAllLoans()">ВЕРНУТЬ ДОЛГИ</button>`;
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function takeAnyLoan(type, limit, inputId) {
            let val = parseInt(document.getElementById(inputId).value);
            if (!isNaN(val) && val > 0 && val <= limit) {
                if (type === 'bananas' && !data.loanB) { data.loanB = val; data.bananas += val; }
                else if (type === 'diamonds' && !data.loanD) { data.loanD = val; data.diamonds += val; }
                else if (type === 'crypto' && !data.loanC) { data.loanC = val; data.crypto += val; }
                else { return alert("Уже есть долг этого типа!"); }
                
                if (!data.loanTime) data.loanTime = Date.now();
                updateDisplay(); closeModal();
            } else { alert("Неверная сумма!"); }
        }

        function payAllLoans() {
            if (data.bananas >= (data.loanB || 0) && data.diamonds >= (data.loanD || 0) && data.crypto >= (data.loanC || 0)) {
                data.bananas -= (data.loanB || 0);
                data.diamonds -= (data.loanD || 0);
                data.crypto -= (data.loanC || 0);
                data.loanB = 0; data.loanD = 0; data.loanC = 0; data.loanTime = 0;
                updateDisplay(); alert("Долги выплачены!"); closeModal();
            } else { alert("Недостаточно средств!"); }
        }

        function send(type) {
            let user = document.getElementById('target-user').value;
            let amt = parseInt(document.getElementById('transfer-amt').value);
            // ПРОВЕРКА: Если всё введено верно
            if (user && !isNaN(amt) && amt > 0 && amt <= 100000) {
                if (data[type] >= amt) {
                    data[type] -= amt;
                    alert("Перевод " + amt + " " + type + " для " + user + " выполнен!");
                    updateDisplay();
                    closeModal();
                } else { alert("Недостаточно средств на балансе!"); }
            } else { alert("Ошибка! Проверьте сумму или ник."); }
        }

        function exchange() { if (data.bananas >= 500) { data.bananas -= 500; data.diamonds += 50; updateDisplay(); } }
        function buyUpg() { if (data.bananas >= data.upgCost) { data.bananas -= data.upgCost; data.clickPower++; data.upgCost *= 2; updateDisplay(); } }
        function buyDouble() { if (data.crypto >= data.doubleCost) { data.crypto -= data.doubleCost; data.clickPower *= 2; data.doubleCost++; updateDisplay(); } }
        function buyCrypto() { if (data.diamonds >= 10000) { data.diamonds -= 10000; data.crypto++; updateDisplay(); } }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
