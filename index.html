<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Banana Clicker Save & Loan</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-bg: #0b0b0b; --card-bg: #161616; --accent: #f1c40f; --diamond: #3498db; --danger: #e74c3c; }
        body { 
            background-color: var(--main-bg); color: white; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; height: 100vh; overflow: hidden;
        }
        .header { 
            display: flex; gap: 15px; margin-top: 20px; background: var(--card-bg); 
            padding: 10px 20px; border-radius: 20px; border: 1px solid #333;
        }
        .stat { text-align: center; min-width: 70px; }
        .stat-val { font-size: 20px; font-weight: bold; display: block; }
        .stat-label { font-size: 10px; color: #777; }

        .main-clicker { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .banana-emoji { font-size: 130px; cursor: pointer; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        .banana-emoji:active { transform: scale(0.8); }

        .menu { 
            width: 100%; background: var(--card-bg); padding: 20px 0; border-radius: 25px 25px 0 0;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; border-top: 1px solid #333;
        }
        .btn { 
            background: #222; border: none; color: white; padding: 12px 20px; 
            border-radius: 15px; font-weight: bold; font-size: 14px;
        }
        .btn-save { background: #27ae60; }
        .btn-loan { background: var(--danger); }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; width: 85%; text-align: center; border: 1px solid #444; }
        .close { margin-top: 20px; color: #777; cursor: pointer; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat"><span class="stat-val" id="score">0</span><span class="stat-label">Бананы</span></div>
        <div class="stat"><span class="stat-val" id="diamonds" style="color:var(--diamond)">0</span><span class="stat-label">Алмазы</span></div>
        <div class="stat"><span class="stat-val" id="loan-stat" style="color:var(--danger)">0</span><span class="stat-label">Долг</span></div>
    </div>

    <div class="main-clicker">
        <div class="banana-emoji" id="banana">🍌</div>
    </div>

    <div class="menu">
        <button class="btn" onclick="openModal('shop')">МАГАЗИН</button>
        <button class="btn btn-loan" onclick="openModal('loan')">ЗАЙМ 💸</button>
        <button class="btn btn-save" onclick="saveGame()">СОХРАНИТЬ</button>
    </div>

    <div id="modal">
        <div class="card" id="modal-content"></div>
        <span class="close" onclick="closeModal()">Закрыть</span>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Данные игрока
        let data = {
            bananas: 0,
            diamonds: 0,
            clickPower: 1,
            upgCost: 10,
            loan: 0,
            loanTime: 0
        };

        // Загрузка
        function loadGame() {
            const saved = localStorage.getItem('bananaSave');
            if (saved) {
                data = JSON.parse(saved);
                checkLoanStatus();
                updateDisplay();
            }
        }

        function saveGame() {
            localStorage.setItem('bananaSave', JSON.stringify(data));
            tg.HapticFeedback.notificationOccurred('success');
            tg.MainButton.setText("СОХРАНЕНО!").show();
            setTimeout(() => tg.MainButton.hide(), 2000);
        }

        function updateDisplay() {
            document.getElementById('score').innerText = Math.floor(data.bananas);
            document.getElementById('diamonds').innerText = data.diamonds;
            document.getElementById('loan-stat').innerText = data.loan;
        }

        // Клик
        document.getElementById('banana').addEventListener('touchstart', (e) => {
            e.preventDefault();
            data.bananas += data.clickPower;
            updateDisplay();
            tg.HapticFeedback.impactOccurred('medium');
        });

        // Модалки
        function openModal(type) {
            const mc = document.getElementById('modal-content');
            if (type === 'shop') {
                mc.innerHTML = `<h2>Магазин</h2>
                    <p>Мульти-тап (Ур. ${data.clickPower})</p>
                    <button class="btn" onclick="buyUpgrade()">Купить за ${data.upgCost} 💎</button>
                    <hr style="border:1px solid #333; margin:15px 0">
                    <p>Обмен: 500 🍌 -> 50 💎</p>
                    <button class="btn" onclick="exchange()">Обменять</button>`;
            } else if (type === 'loan') {
                mc.innerHTML = `<h2>Банк</h2>
                    <p>Возьми 1000 🍌 сейчас!</p>
                    <p style="font-size:12px; color:gray">Нужно вернуть через 24 часа, иначе спишем принудительно.</p>
                    <button class="btn btn-loan" onclick="takeLoan()">ВЗЯТЬ 1000 🍌</button>
                    <button class="btn" style="margin-top:10px" onclick="payLoan()">ВЕРНУТЬ ДОЛГ</button>`;
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // Экономика
        function buyUpgrade() {
            if (data.diamonds >= data.upgCost) {
                data.diamonds -= data.upgCost;
                data.clickPower++;
                data.upgCost *= 2;
                updateDisplay();
                closeModal();
            } else { alert("Мало алмазов!"); }
        }

        function exchange() {
            if (data.bananas >= 500) {
                data.bananas -= 500;
                data.diamonds += 50;
                updateDisplay();
            }
        }

        // Логика Займа
        function takeLoan() {
            if (data.loan > 0) { alert("У тебя уже есть долг!"); return; }
            data.loan = 1000;
            data.bananas += 1000;
            data.loanTime = Date.now();
            saveGame();
            updateDisplay();
            closeModal();
        }

        function payLoan() {
            if (data.bananas >= data.loan && data.loan > 0) {
                data.bananas -= data.loan;
                data.loan = 0;
                data.loanTime = 0;
                updateDisplay();
                alert("Долг погашен!");
                saveGame();
            } else { alert("Недостаточно бананов для оплаты!"); }
        }

        function checkLoanStatus() {
            if (data.loan > 0 && data.loanTime > 0) {
                const dayInMs = 24 * 60 * 60 * 1000;
                if (Date.now() - data.loanTime > dayInMs) {
                    data.bananas -= data.loan; // Принудительное списание
                    data.loan = 0;
                    data.loanTime = 0;
                    alert("Время займа вышло! Бананы списаны.");
                    saveGame();
                }
            }
        }

        // Авто-сохранение каждые 10 секунд
        setInterval(saveGame, 10000);
        loadGame();
    </script>
</body>
</html>
