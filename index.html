<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Banana Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-bg: #121212; --card-bg: #1e1e1e; --accent: #f1c40f; --diamond: #3498db; }
        body { 
            background-color: var(--main-bg); color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; height: 100vh; overflow: hidden;
        }
        .header { display: flex; gap: 20px; margin-top: 20px; background: var(--card-bg); padding: 10px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .stat { text-align: center; }
        .stat-val { font-size: 20px; font-weight: bold; display: block; }
        .stat-label { font-size: 12px; color: #888; }
        
        .main-clicker { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .banana { width: 250px; cursor: pointer; transition: transform 0.1s; user-select: none; -webkit-tap-highlight-color: transparent; }
        .banana:active { transform: scale(0.9); }

        .menu { 
            width: 100%; background: var(--card-bg); padding: 20px; border-radius: 25px 25px 0 0;
            display: flex; justify-content: space-around; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        .btn { 
            background: #2a2a2a; border: none; color: white; padding: 12px 20px; 
            border-radius: 12px; font-weight: bold; transition: 0.3s; width: 45%;
        }
        .btn-shop { border-bottom: 3px solid var(--accent); }
        .btn-donate { border-bottom: 3px solid var(--diamond); opacity: 0.7; }

        /* Окно магазина */
        #shop-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .shop-card { background: var(--card-bg); padding: 20px; border-radius: 20px; width: 80%; text-align: center; }
        .close-shop { margin-top: 20px; color: #ff4757; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat">
            <span class="stat-val" id="score">0</span>
            <span class="stat-label">Бананы 🍌</span>
        </div>
        <div class="stat">
            <span class="stat-val" style="color: var(--diamond)" id="diamonds">0</span>
            <span class="stat-label">Алмазы 💎</span>
        </div>
    </div>

    <div class="main-clicker">
        <img src="https://cdn-icons-png.flaticon.com/512/2909/2909808.png" class="banana" id="banana">
    </div>

    <div class="menu">
        <button class="btn btn-shop" onclick="toggleShop()">Магазин 🛒</button>
        <button class="btn btn-donate" onclick="alert('Магазин донатов скоро откроется!')">Донат 💎</button>
    </div>

    <div id="shop-modal">
        <div class="shop-card">
            <h2>Улучшения</h2>
            <p>Мульти-тап (ур. <span id="lp-lvl">1</span>)</p>
            <button class="btn" onclick="buyUpgrade()" style="width: 100%; background: var(--accent); color: black;">
                Купить за 10 💎
            </button>
            <div class="close-shop" onclick="toggleShop()">Закрыть</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let bananas = 0;
        let diamonds = 0;
        let clickPower = 1;
        let upgradeCost = 10;
        let totalClicksForDiamond = 0;

        const bananaBtn = document.getElementById('banana');
        const scoreDisp = document.getElementById('score');
        const diamondDisp = document.getElementById('diamonds');

        bananaBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            bananas += clickPower;
            totalClicksForDiamond += clickPower;
            
            // Логика алмазов: каждые 100 тапов даем 5+ алмазов
            if (totalClicksForDiamond >= 100) {
                let bonus = Math.floor(Math.random() * 6) + 5; // 5, 6, 7, 8, 9 или 10
                diamonds += bonus;
                totalClicksForDiamond = 0;
                tg.HapticFeedback.notificationOccurred('success');
            }

            updateDisplay();
            tg.HapticFeedback.impactOccurred('medium');
        });

        function updateDisplay() {
            scoreDisp.innerText = Math.floor(bananas);
            diamondDisp.innerText = diamonds;
        }

        function toggleShop() {
            const modal = document.getElementById('shop-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function buyUpgrade() {
            if (diamonds >= upgradeCost) {
                diamonds -= upgradeCost;
                clickPower += 1;
                upgradeCost = Math.floor(upgradeCost * 1.5);
                document.getElementById('lp-lvl').innerText = clickPower;
                updateDisplay();
                alert('Улучшено! Теперь + ' + clickPower + ' за клик!');
            } else {
                alert('Недостаточно алмазов! Тапай еще!');
            }
        }
    </script>
</body>
</html>
