<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Banana Clicker - Circle Edition</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
    --main-bg: #0b0b0b;
    --card-bg: #161616;
    --accent: #fbc531;
    --diamond: #00a8ff;
    --crypto: #9c88ff;
    --danger: #e84118;
    --success: #4cd137;
}

/* УБРАТЬ СИНИЙ ТАП */
* {
    -webkit-tap-highlight-color: transparent;
}

body {
    background-color: var(--main-bg);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    height: 100vh;
    overflow: hidden;
}

.header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 15px;
    background: var(--card-bg);
    padding: 10px 15px;
    border-radius: 15px;
    border: 1px solid #333;
}

.stat { text-align: center; min-width: 80px; padding: 5px; }
.stat-val { font-size: 18px; font-weight: bold; display: block; }
.stat-label { font-size: 9px; color: #777; text-transform: uppercase; }

.main-clicker {
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
}

.click-zone {
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, rgba(251, 197, 49, 0.15) 0%, rgba(0,0,0,0) 70%);
    border: 4px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.banana-emoji {
    font-size: 110px;
    user-select: none;
}

.menu {
    width: 100%;
    background: var(--card-bg);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
}

.btn {
    background: #222;
    border: none;
    color: white;
    padding: 12px;
    border-radius: 10px;
}

#modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.card {
    background: #111;
    padding: 20px;
    border-radius: 15px;
    width: 85%;
}
</style>
</head>

<body>

<!-- ДИСКЛЕЙМЕР -->
<div id="disclaimer" style="position:fixed;width:100%;height:100%;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;text-align:center;">
<h2>⚠️ Дисклеймер</h2>
<p>
Игра для развлечения<br>
Автор: @Bulba_73<br>
Без ответственности
</p>
<button class="btn" onclick="closeDisclaimer()">Пропустить</button>
</div>

<div class="header">
<div class="stat"><span id="score">0</span><br>🍌</div>
<div class="stat"><span id="diamonds">0</span><br>💎</div>
<div class="stat"><span id="crypto-stat">0</span><br>₿</div>
<div class="stat"><span id="loan-stat">0</span><br>💸</div>
</div>

<div class="main-clicker">
<div class="click-zone" id="banana">
<div class="banana-emoji">🍌</div>
</div>
</div>

<div class="menu">
<button class="btn" onclick="openModal('shop')">МАГАЗИН</button>
<button class="btn" onclick="openModal('loan')">ЗАЙМ</button>
<button class="btn" onclick="alert('Скоро!')">ДОНАТ</button>
<button class="btn" onclick="alert('Скоро!')">ОПЦИИ</button>
<button class="btn" onclick="openModal('transfer')">ПЕРЕВОД</button>
<button class="btn" onclick="openModal('history')">ИСТОРИЯ</button>
<button class="btn" onclick="saveGame()">СОХРАНИТЬ</button>
</div>

<div id="modal">
<div class="card" id="modal-content"></div>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let data = {
bananas:0,
diamonds:0,
crypto:0,
clickPower:1,
upgCost:100,
doubleCost:100,
loan:0,
loanTime:0,
transfers:[]
};

function closeDisclaimer(){
document.getElementById('disclaimer').style.display='none';
}

function updateDisplay(){
score.innerText=Math.floor(data.bananas);
diamonds.innerText=data.diamonds;
document.getElementById('crypto-stat').innerText=data.crypto;
document.getElementById('loan-stat').innerText=data.loan;
}

/* КЛИК */
document.getElementById('banana').addEventListener('click', ()=>{
let mult = 1;
if(data.crypto>0 && Math.random()<0.25) mult = 2;
data.bananas += data.clickPower * mult;
updateDisplay();
});

/* SHOP */
function buyCrypto(){
if(data.diamonds>=10000){
data.diamonds-=10000;
data.crypto++;
updateDisplay();
}
}

/* MODAL */
function openModal(type){
let mc=document.getElementById('modal-content');

if(type==='shop'){
mc.innerHTML=`
<h3>Магазин</h3>
<button class="btn" onclick="buyCrypto()">Крипта (10k 💎)</button>
<button class="btn" onclick="closeModal()">Закрыть</button>`;
}

else if(type==='loan'){
mc.innerHTML=`
<h3>Займ</h3>
<input id="loanInput" type="number" placeholder="Сумма">
<button class="btn" onclick="takeLoan()">Взять</button>
<button class="btn" onclick="payLoan()">Вернуть</button>`;
}

else if(type==='transfer'){
mc.innerHTML=`
<h3>Перевод</h3>
<input id="user" placeholder="@username">
<input id="amount" type="number" placeholder="Сумма">
<button class="btn" onclick="sendTransfer()">Отправить</button>`;
}

else if(type==='history'){
let html="<h3>История</h3>";
if(data.transfers.length===0) html+="Пусто";
data.transfers.slice(-5).reverse().forEach(t=>{
html+=`<p>@${t.from} → @${t.to} | ${t.amount} 🍌</p>`;
});
mc.innerHTML=html;
}

modal.style.display='flex';
}

function closeModal(){
modal.style.display='none';
}

/* ПЕРЕВОД */
function sendTransfer(){
let u=document.getElementById('user').value;
let a=parseInt(document.getElementById('amount').value);

if(!u||!a) return;
if(data.bananas<a) return alert("Мало");

if(!confirm(`Отправить ${a} 🍌 @${u}?`)) return;

data.bananas-=a;

data.transfers.push({
from: tg.initDataUnsafe.user?.username || "you",
to: u.replace("@",""),
amount:a
});

updateDisplay();
closeModal();
}

function saveGame(){
localStorage.setItem('banana',JSON.stringify(data));
alert("Сохранено");
}

function loadGame(){
let s=localStorage.getItem('banana');
if(s) data=JSON.parse(s);
updateDisplay();
}

loadGame();
</script>

</body>
</html>
